\* ===========================================================================
\* kesseldb-tla/Replication.cfg — TLC configuration for Replication.tla
\* ===========================================================================
\*
\* SP109 / S1 — Task 3: baseline TLC model-check.
\*
\* This file binds the spec's CONSTANTS and lists the four state-invariants
\* TLC verifies in every reachable state of the bounded model. The fifth
\* invariant from Decision-4 of the SP109 design spec —
\* MonotonicCommitPoint — is a transition property ([][P]_vars) rather
\* than a per-state predicate; it is intentionally OMITTED from this cfg
\* per the SP109 plan T3 step 1 commentary, and will be promoted to a
\* PROPERTY in the S1.2 Liveness follow-up slice. See the spec head
\* comment in Replication.tla for the full SCOPE / OUT-OF-SCOPE list.
\*
\* BOUNDED-MODEL CONSTANTS (per design Decision-2):
\*   Replicas       = {r1, r2, r3}   — N=3, smallest quorum-meaningful set
\*                                     (majority = 2; tolerates 1 failure).
\*   MaxDrops       = 3              — bounds DropMessage; 1 per replica in
\*                                     the worst case still permits a
\*                                     prepare/prepareOk round-trip drop.
\*   MaxViewChanges = 2              — at least one completed view-change
\*                                     plus one escalation-and-retry path.
\*   MaxRequests    = 3              — enough log entries to expose ordering
\*                                     / prefix divergence under view-change.
\*
\* CHECK_DEADLOCK FALSE — the bounded model has natural halt states (all
\* messages dropped, MaxRequests exhausted, MaxViewChanges exhausted).
\* These are bound-induced, not protocol bugs; TLC must not flag them.
\*
\* References:
\*   docs/superpowers/specs/2026-05-19-tla-replication-safety.md (design)
\*   docs/superpowers/plans/2026-05-19-tla-replication-safety.md (T3 plan)
\* ===========================================================================

SPECIFICATION Spec

CONSTANTS
    Replicas       = {r1, r2, r3}
    MaxDrops       = 3
    MaxViewChanges = 2
    MaxRequests    = 3

INVARIANT
    TypeOK
    LogPrefixSafety
    NoDivergence
    ExactlyOnceApply

CHECK_DEADLOCK
    FALSE
