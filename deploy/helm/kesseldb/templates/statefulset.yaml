{{- if .Values.cluster.enabled -}}
# SP-Cloud-Cluster T1 — multi-pod StatefulSet for replicated VSR clustering.
#
# Renders ONLY when .Values.cluster.enabled is true. The default single-pod
# Deployment (templates/deployment.yaml) is gated off in that branch so we
# don't deploy both shapes at once.
#
# Cluster shape:
#   - N replicas (default 3, opt 5) with VSR consensus over a headless Service.
#   - One PVC per pod via volumeClaimTemplates (every replica has the full data).
#   - Pod hostname suffix is the replica idx (kesseldb-0 → 0).
#   - KESSELDB_CLUSTER_PEER_ADDRS env carries every pod's DNS:6532 address.
#
# NB: T1 ships the YAML scaffold. The binary CLI flags `--cluster /
# --replica-idx / --peer-addrs` are wired in T2; today's image will
# CrashLoopBackOff on `unknown argument --cluster` (intentional —
# clean failure mode, not stuck-pending).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kesseldb.fullname" . }}
  labels:
    {{- include "kesseldb.labels" . | nindent 4 }}
spec:
  # VSR is fixed-size; legal values are 3 or 5. The chart does not
  # enforce odd N or N>=3 — the binary will refuse at runtime.
  replicas: {{ .Values.cluster.replicas }}
  # Required for stable pod DNS via the headless Service.
  serviceName: {{ include "kesseldb.fullname" . }}-headless
  # VSR does not require ordered startup; parallel is faster to bootstrap.
  podManagementPolicy: {{ .Values.cluster.podManagementPolicy | default "Parallel" }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      {{- include "kesseldb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kesseldb.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kesseldb.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kesseldb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Cluster pods derive their replica idx from the pod hostname
          # ($HOSTNAME suffix after the last `-`). KESSELDB_CLUSTER_PEER_ADDRS
          # is set below as the full comma-separated peer list, identical
          # on every pod, so VSR sees a consistent membership.
          command:
            - "/bin/sh"
            - "-c"
            - |
              set -eu
              IDX="${HOSTNAME##*-}"
              echo "kesseldb cluster pod: idx=$IDX peers=$KESSELDB_CLUSTER_PEER_ADDRS"
              exec /usr/local/bin/kesseldb \
                --cluster \
                --replica-idx "$IDX" \
                --peer-addrs "$KESSELDB_CLUSTER_PEER_ADDRS" \
                0.0.0.0:6532 \
                /data
          ports:
            - name: binary
              containerPort: {{ .Values.service.binary.targetPort }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.service.http.targetPort }}
              protocol: TCP
            - name: postgres
              containerPort: {{ .Values.service.postgres.targetPort }}
              protocol: TCP
          env:
            {{- if .Values.env.httpAddr }}
            - name: KESSELDB_HTTP_ADDR
              value: {{ .Values.env.httpAddr | quote }}
            {{- end }}
            {{- if .Values.env.pgAddr }}
            - name: KESSELDB_PG_ADDR
              value: {{ .Values.env.pgAddr | quote }}
            {{- end }}
            {{- if .Values.auth.secretName }}
            - name: KESSELDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName | quote }}
                  key: {{ .Values.auth.secretKey | quote }}
            {{- end }}
            # ----- Cluster-mode env (read by the binary at startup; T2) -----
            - name: KESSELDB_CLUSTER_PEER_ADDRS
              value: {{ include "kesseldb.clusterPeerAddrs" . | quote }}
            - name: KESSELDB_CLUSTER_VIEW_CHANGE_TIMEOUT
              value: {{ .Values.cluster.viewChangeTimeout | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.probes.liveness.tcpSocket.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.probes.readiness.tcpSocket.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  # Per-pod PVC; supersedes templates/pvc.yaml in cluster mode.
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "kesseldb.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- range .Values.persistence.accessModes }}
          - {{ . | quote }}
          {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        {{- end }}
{{- end -}}
