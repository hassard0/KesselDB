apiVersion: v1
kind: Service
metadata:
  name: {{ include "kesseldb.fullname" . }}
  labels:
    {{- include "kesseldb.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kesseldb.selectorLabels" . | nindent 4 }}
  ports:
    - name: binary
      port: {{ .Values.service.binary.port }}
      targetPort: {{ .Values.service.binary.targetPort }}
      protocol: TCP
    - name: http
      port: {{ .Values.service.http.port }}
      targetPort: {{ .Values.service.http.targetPort }}
      protocol: TCP
    - name: postgres
      port: {{ .Values.service.postgres.port }}
      targetPort: {{ .Values.service.postgres.targetPort }}
      protocol: TCP
