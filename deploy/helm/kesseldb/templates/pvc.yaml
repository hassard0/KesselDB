{{- if and .Values.persistence.enabled (not .Values.cluster.enabled) -}}
# SP-Cloud-Deploy V1 — single-pod PVC.
#
# Renders ONLY in single-pod mode. Cluster mode uses the StatefulSet's
# volumeClaimTemplates (one PVC per pod, deterministically named
# data-{fullname}-{ordinal}).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kesseldb.fullname" . }}-data
  labels:
    {{- include "kesseldb.labels" . | nindent 4 }}
  {{- with .Values.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- range .Values.persistence.accessModes }}
    - {{ . | quote }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- if .Values.persistence.storageClassName }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
  {{- end }}
{{- end -}}
