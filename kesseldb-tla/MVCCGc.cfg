\* ===========================================================================
\* kesseldb-tla/MVCCGc.cfg — TLC configuration for MVCCGc.tla
\* ===========================================================================
\*
\* SP114 / S2.5 — Task 6: baseline TLC model-check for the GC + dynamic
\* watermark protocol layer on top of the SP113 SSI substrate. Extends
\* MVCCSsi from SP113; via that extends MVCCSi (SP112), MVCCTx (SP111),
\* and MVCCStorage (SP110).
\*
\* This file binds the spec's CONSTANTS (the MVCCStorage + MVCCTx + MVCCSi +
\* MVCCSsi constants inherited via the EXTENDS chain plus the GC-specific
\* MaxWatermark and sentinel) and lists the TWENTY-THREE invariants
\* required by the S2.5 design Decision 8: the 17 MVCCSsi invariants
\* carried forward (12 from MVCCSi/MVCCTx/MVCCStorage + 5 SSI-specific:
\* TypeOKSsi/PendingTxsWindowBounded/DangerousStructureAborts/NoWriteSkew/
\* SerializableEquivalence) PLUS 6 new GC-specific invariants (TypeOKGc,
\* WatermarkMonotonic, NoVersionBelowWatermark, NoPendingTxBelowWatermark,
\* SnapshotAvailability, BoundedWindowSupersededByWatermark).
\*
\* BOUNDED-MODEL CONSTANTS — chosen per the S2.5 design Decision 8 for a
\* small-but-meaningful state space that TLC can exhaust completely on a
\* Windows laptop. The GC extension adds lowWaterMark + AdvanceWatermark
\* on top of the SP113 SSI composite state space; the resulting composite
\* is slightly larger than MVCCSsi's (~348K states / 7s). TIGHTENED
\* relative to MVCCSsi by holding OpNums + TxIds + MaxTxOps identical and
\* adding MaxWatermark = 2 (the largest legal watermark in the bounded
\* model is opCount, capped at MaxOps - 1 = 2; MaxWatermark = 2 covers
\* every legal value).
\*
\*   TypeIds      = {1}              — 1 type_id (matches MVCCSsi).
\*   ObjectIds    = {1, 2}           — 2 object_ids; the key axis the
\*                                     watermark prune operates on.
\*   OpNums       = {0, 1, 2}        — 3 commit_opnums; exercises
\*                                     commit_opnum=0 edge AND watermark=0/1/2
\*                                     boundaries.
\*   Values       = {"v1", "v2"}     — 2 distinct payloads.
\*   MaxOps       = 3                — bound on opCount (state-space cap on
\*                                     CommitSsi+AdvanceWatermark op count).
\*   TxIds        = {"t1", "t2"}     — 2 concurrent Tx (matches MVCCSsi).
\*   MaxTxOps     = 4                — bound on Tx + SI + SSI + GC actions.
\*   MaxTxAge     = 5                — TLA+ analogue of Rust MAX_TX_AGE.
\*   MaxWatermark = 2                — bound on the AdvanceWatermark
\*                                     proposal (Decision 8). At
\*                                     MaxOps = 3 the largest legal
\*                                     accepted W is 2 (W <= opCount;
\*                                     opCount maxes at 2 since the
\*                                     advance itself bumps opCount by 1
\*                                     and is rejected when W >
\*                                     opCount). Free-choice W in
\*                                     [0..MaxWatermark] exercises the
\*                                     three branches (NotMonotonic /
\*                                     AboveCommitCeiling / Accepted)
\*                                     of the AdvanceWatermark action.
\*   SiUnused     = "Si"             — sentinel; no semantic role.
\*   SsiUnused    = "Ssi"            — sentinel; no semantic role.
\*   GcUnused     = "Gc"             — sentinel; no semantic role.
\*
\* CHECK_DEADLOCK FALSE — the bounded model has natural halt states
\* (all MaxOps + MaxTxOps consumed; no Active Tx left). These are bound-
\* induced, not contract bugs; TLC must not flag them.
\*
\* INVARIANT BLOCK — 23 invariants total: 17 carried forward via EXTENDS
\* (TypeOKTx, SnapshotImmutability, ReadSetMonotonic, ReadSetCoversAllReads,
\* ReadAtSnapshot, TxStatusMonotonic, TypeOKSi, WriteSetMonotonic,
\* WriteWriteConflictDetected, CommitAtomicity, FirstCommitterWins,
\* DeterministicApply, TypeOKSsi, PendingTxsWindowBounded,
\* DangerousStructureAborts, NoWriteSkew, SerializableEquivalence) + 6
\* GC-specific per Decision 8 (TypeOKGc, WatermarkMonotonic,
\* NoVersionBelowWatermark, NoPendingTxBelowWatermark, SnapshotAvailability,
\* BoundedWindowSupersededByWatermark).
\*
\* References:
\*   docs/superpowers/specs/2026-05-24-mvcc-si-s2-5-design.md (S2.5 design)
\*   docs/superpowers/plans/2026-05-24-mvcc-si-s2-5.md        (S2.5 plan, T6)
\*   kesseldb-tla/MVCCSsi.tla                                  (extended base)
\* ===========================================================================

SPECIFICATION SpecGc

CONSTANTS
    TypeIds      = {1}
    ObjectIds    = {1, 2}
    OpNums       = {0, 1, 2}
    Values       = {"v1", "v2"}
    MaxOps       = 3
    TxIds        = {"t1", "t2"}
    MaxTxOps     = 4
    MaxTxAge     = 5
    MaxWatermark = 2
    SiUnused     = "Si"
    SsiUnused    = "Ssi"
    GcUnused     = "Gc"

INVARIANT
    TypeOKTx
    SnapshotImmutability
    ReadSetMonotonic
    ReadSetCoversAllReads
    ReadAtSnapshot
    TxStatusMonotonic
    TypeOKSi
    WriteSetMonotonic
    WriteWriteConflictDetected
    \* CommitAtomicity (MVCCSi) DROPPED in the GC layer: legitimately
    \* violated by AdvanceWatermark reclaiming a Committed Tx's
    \* versions. REPLACED by CommitAtomicityGc below which conditions
    \* on commit_opnum >= lowWaterMark. SP109-SP113 discipline: never
    \* weaken; restate. The GC-aware form is STRONGER above the
    \* watermark (same claim) and legitimately silent below.
    FirstCommitterWins
    \* DeterministicApply (MVCCSi) DROPPED in the GC layer: same reason
    \* as CommitAtomicity — its "versions exist for every Committed
    \* Tx" sub-clause is legitimately violated by GC. REPLACED by
    \* DeterministicApplyGc below.
    TypeOKSsi
    PendingTxsWindowBounded
    DangerousStructureAborts
    NoWriteSkew
    SerializableEquivalence
    TypeOKGc
    WatermarkMonotonic
    NoVersionBelowWatermark
    NoPendingTxBelowWatermark
    SnapshotAvailability
    CommitAtomicityGc
    DeterministicApplyGc
    BoundedWindowSupersededByWatermark

CHECK_DEADLOCK
    FALSE
