\* ===========================================================================
\* kesseldb-tla/MVCCCutover.cfg — TLC configuration for MVCCCutover.tla
\* ===========================================================================
\*
\* SP115 / S2.6 — Task 6: baseline TLC model-check for the MVCC infrastructure
\* cutover layer at NARROWED scope on top of the SP114 MVCCGc substrate.
\* Extends MVCCGc from SP114; via that extends MVCCSsi (SP113), MVCCSi
\* (SP112), MVCCTx (SP111), and MVCCStorage (SP110).
\*
\* This file binds the spec's CONSTANTS (the MVCCStorage + MVCCTx + MVCCSi +
\* MVCCSsi + MVCCGc constants inherited via the EXTENDS chain plus the
\* cutover-specific MaxRegisterCycles, MaxHeartbeats, and CutoverUnused
\* sentinel) and lists the invariants per the NARROWED Decision 9:
\* the 23 MVCCGc invariants carried forward (17 MVCCSsi+prior carried
\* forward PLUS 6 GC-specific) MINUS the 2 GC-incompatible inherited
\* (CommitAtomicity / DeterministicApply DROPPED in MVCCGc.cfg already)
\* PLUS 5 NEW NARROWED cutover-specific invariants:
\*   - TypeOKCutover
\*   - ActiveSnapshotsBoundedByWatermark
\*   - HeartbeatRespectsActiveSnapshots
\*   - AutoCommitBracketBalanced
\*   - CommitTxWritesVersionedKeyspaceOnly
\*
\* The two SP115 plan invariants DROPPED per the T2 narrowing disclosure
\* (xshard digest contract conflict; apply arms still write legacy):
\*   - LegacyKeyspaceEmpty  — INTENTIONALLY OMITTED until SP116 lands
\*                            the 14 apply-arm cutover.
\*   - SQLAutoCommitSerializability — superseded by MVCCSsi's
\*                            SerializableEquivalence carried forward.
\*
\* BOUNDED-MODEL CONSTANTS — TIGHTENED relative to MVCCGc to keep TLC
\* tractable on a Windows laptop while exercising every new action +
\* invariant.
\*
\*   TypeIds            = {1}              — 1 type_id (matches MVCCGc).
\*   ObjectIds          = {1, 2}           — 2 object_ids.
\*   OpNums             = {0, 1, 2}        — 3 commit_opnums; covers
\*                                           commit_opnum=0 edge AND
\*                                           soft-accept (c=0) AND
\*                                           explicit-c (c>0) branches.
\*   Values             = {"v1", "v2"}     — 2 distinct payloads.
\*   MaxOps             = 3                — bound on opCount; matches
\*                                           MVCCGc.
\*   TxIds              = {"t1", "t2"}     — 2 concurrent Tx; matches
\*                                           MVCCGc.
\*   MaxTxOps           = 4                — bound on Tx + SI + SSI + GC +
\*                                           cutover actions.
\*   MaxTxAge           = 5                — TLA+ analogue of Rust
\*                                           MAX_TX_AGE.
\*   MaxWatermark       = 2                — bound on AdvanceWatermark
\*                                           proposal.
\*   MaxRegisterCycles  = 3                — bound on RegisterSnapshot
\*                                           firings. Covers the
\*                                           register/unregister bracket
\*                                           interleaving with multiple
\*                                           concurrent in-flight Tx.
\*   MaxHeartbeats      = 2                — bound on HeartbeatTick
\*                                           firings. Sufficient to
\*                                           exercise the heartbeat both
\*                                           when active_snapshots is
\*                                           non-empty (target = min) AND
\*                                           empty (target = opCount).
\*   SiUnused           = "Si"             — sentinel; no semantic role.
\*   SsiUnused          = "Ssi"            — sentinel; no semantic role.
\*   GcUnused           = "Gc"             — sentinel; no semantic role.
\*   CutoverUnused      = "Cutover"        — sentinel; no semantic role.
\*
\* CHECK_DEADLOCK FALSE — the bounded model has natural halt states
\* (all MaxOps + MaxTxOps + MaxRegisterCycles + MaxHeartbeats consumed).
\* These are bound-induced, not contract bugs.
\*
\* INVARIANT BLOCK — 26 invariants total: 21 carried forward via EXTENDS
\* (17 from MVCCSsi+prior + 6 from MVCCGc - 2 GC-incompatible already
\* dropped + 2 GC-aware reformulations from MVCCGc = 21 effective) + 5
\* NEW NARROWED cutover-specific (TypeOKCutover,
\* ActiveSnapshotsBoundedByWatermark, HeartbeatRespectsActiveSnapshots,
\* AutoCommitBracketBalanced, CommitTxWritesVersionedKeyspaceOnly).
\*
\* References:
\*   docs/superpowers/specs/2026-05-24-mvcc-si-s2-6-design.md (S2.6 design)
\*   docs/superpowers/plans/2026-05-24-mvcc-si-s2-6.md        (S2.6 plan, T6)
\*   kesseldb-tla/MVCCGc.tla                                   (extended base)
\* ===========================================================================

SPECIFICATION SpecCutover

CONSTANTS
    TypeIds           = {1}
    ObjectIds         = {1, 2}
    OpNums            = {0, 1, 2}
    Values            = {"v1", "v2"}
    MaxOps            = 3
    TxIds             = {"t1", "t2"}
    MaxTxOps          = 4
    MaxTxAge          = 5
    MaxWatermark      = 2
    MaxRegisterCycles = 3
    MaxHeartbeats     = 2
    SiUnused          = "Si"
    SsiUnused         = "Ssi"
    GcUnused          = "Gc"
    CutoverUnused     = "Cutover"

INVARIANT
    TypeOKTx
    SnapshotImmutability
    ReadSetMonotonic
    ReadSetCoversAllReads
    ReadAtSnapshot
    TxStatusMonotonic
    TypeOKSi
    WriteSetMonotonic
    WriteWriteConflictDetected
    FirstCommitterWins
    TypeOKSsi
    PendingTxsWindowBounded
    DangerousStructureAborts
    NoWriteSkew
    SerializableEquivalence
    TypeOKGc
    WatermarkMonotonic
    NoVersionBelowWatermark
    NoPendingTxBelowWatermark
    SnapshotAvailability
    CommitAtomicityGc
    DeterministicApplyGc
    BoundedWindowSupersededByWatermark
    TypeOKCutover
    ActiveSnapshotsBoundedByWatermark
    HeartbeatRespectsActiveSnapshots
    AutoCommitBracketBalanced
    CommitTxWritesVersionedKeyspaceOnly

CHECK_DEADLOCK
    FALSE
