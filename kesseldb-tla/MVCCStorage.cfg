\* ===========================================================================
\* kesseldb-tla/MVCCStorage.cfg — TLC configuration for MVCCStorage.tla
\* ===========================================================================
\*
\* SP110 / S2.1 — Task 6: baseline TLC model-check for the MVCC versioned-
\* storage primitive.
\*
\* This file binds the spec's CONSTANTS and lists the four state-invariants
\* TLC verifies in every reachable state of the bounded model.
\*
\* BOUNDED-MODEL CONSTANTS — chosen for a small-but-meaningful state space
\* that TLC can exhaust completely on a Windows laptop in seconds-to-minutes:
\*
\*   TypeIds   = {1, 2}        — 2 distinct type_ids; covers per-type
\*                                isolation (no version bleed across types).
\*   ObjectIds = {1, 2}        — 2 distinct object_ids; covers per-key
\*                                isolation within the same type_id.
\*   OpNums    = 0..3          — 4 commit_opnums; enough to exercise
\*                                multi-version chains AND a snapshot that
\*                                falls between versions.
\*   Values    = {"v1", "v2"}  — 2 distinct payloads; enough to distinguish
\*                                "right version, right value" from "right
\*                                version, wrong value" in TombstoneObserva-
\*                                bility.
\*   MaxOps    = 5             — bound on total Put + Tombstone actions
\*                                (Reads are unbounded). Lets a single key
\*                                accrue up to 4 versions (one per OpNum)
\*                                plus room for a few cross-key writes.
\*
\* Approximate state-space envelope at these bounds:
\*   - keys = |TypeIds| * |ObjectIds| = 4
\*   - per-key version sets are subsets of {0,1,2,3} x ({v1,v2,Tombstone})
\*     bounded by MaxOps; combinatorially ~10^5-10^6 distinct (versions,
\*     opCount) pairs. readLog can grow per Read action; its bound is
\*     implicit (TLC's depth-first exploration will saturate it). The
\*     SnapshotMonotonic + TombstoneObservability checks are O(|readLog|^2)
\*     per state, so we cap readLog growth via the natural action budget.
\*
\* CHECK_DEADLOCK FALSE — the bounded model has natural halt states (all
\* MaxOps consumed; no new reads add information beyond saturation).
\* These are bound-induced, not contract bugs; TLC must not flag them.
\*
\* References:
\*   docs/superpowers/specs/2026-05-23-mvcc-si-design.md (parent design)
\*   docs/superpowers/plans/2026-05-23-mvcc-si-s2-1.md   (S2.1 plan, T6)
\* ===========================================================================

SPECIFICATION Spec

CONSTANTS
    TypeIds   = {1, 2}
    ObjectIds = {1, 2}
    OpNums    = {0, 1, 2, 3}
    Values    = {"v1", "v2"}
    MaxOps    = 5

INVARIANT
    TypeOK
    SnapshotMonotonic
    NeverNotYetWrittenAfterPut
    TombstoneObservability

CHECK_DEADLOCK
    FALSE
