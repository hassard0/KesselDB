\* ===========================================================================
\* kesseldb-tla/MVCCSsi.cfg — TLC configuration for MVCCSsi.tla
\* ===========================================================================
\*
\* SP113 / S2.4 — Task 6: baseline TLC model-check for the SSI layer
\* (Cahill dangerous-structure detector) on top of the SP112 SI write-side
\* + SM-apply-time conflict check. Extends MVCCSi from SP112; via that
\* extends MVCCTx (SP111) and MVCCStorage (SP110).
\*
\* This file binds the spec's CONSTANTS (the MVCCStorage + MVCCTx + MVCCSi
\* constants inherited via the EXTENDS chain plus the SSI MaxTxAge and
\* sentinel) and lists the SIXTEEN invariants required by the S2.4 design
\* Decision 7: the 11 MVCCSi invariants carried forward PLUS 5 new SSI
\* invariants (TypeOKSsi, PendingTxsWindowBounded, DangerousStructureAborts,
\* NoWriteSkew, SerializableEquivalence).
\*
\* BOUNDED-MODEL CONSTANTS — chosen per the S2.4 design Decision 7 for a
\* small-but-meaningful state space that TLC can exhaust completely on a
\* Windows laptop. The SSI extension adds pendingTxs + rwEdges on top of
\* the SP112 multi-Tx interleaving, so the composite state space is
\* meaningfully larger than MVCCSi's (~3.7M states / 34s). TIGHTENED
\* relative to MVCCSi to keep the SSI composite tractable.
\*
\*   TypeIds   = {1}              — 1 type_id (TIGHTENED from MVCCSi
\*                                   identically; per-(type_id, object_id)
\*                                   uniqueness is exercised via 2
\*                                   ObjectIds within a single type).
\*   ObjectIds = {1, 2}           — 2 distinct object_ids; this is the
\*                                   key axis the SSI rw-edge check
\*                                   works on.
\*   OpNums    = {0, 1, 2}        — 3 commit_opnums; exercises
\*                                   commit_opnum=0 edge (CommitSsi skips
\*                                   rw-edge derivation: no concurrent
\*                                   Tx possible at c=0) + commit_opnum>0
\*                                   concurrent-Tx cases (the 2-Tx
\*                                   write-skew slot).
\*   Values    = {"v1", "v2"}     — 2 distinct payloads (matches MVCCSi);
\*                                   the SSI rw-edge derivation operates
\*                                   on KEYS, not values, so 2 values is
\*                                   sufficient.
\*   MaxOps    = 3                — bound on opCount (state-space cap on
\*                                   CommitSsi-driven opCount growth;
\*                                   matches MVCCSi).
\*   TxIds     = {"t1", "t2"}     — 2 concurrent Tx (Decision 7 of S2.4
\*                                   design — the classic write-skew
\*                                   anomaly requires 2 Tx, fits in the
\*                                   bounded model). A 3-Tx model would
\*                                   let TLC find the canonical
\*                                   T0→T1→T2 dangerous-structure triple
\*                                   — S2.X follow-up.
\*   MaxTxOps  = 4                — bound on Tx + SI + SSI actions
\*                                   (TIGHTENED from MVCCSi's 6 per
\*                                   Decision 7 — the SSI composite
\*                                   state space is richer; each Tx
\*                                   needs Begin → Read+ → Write+ →
\*                                   CommitSsi (4 actions minimum for
\*                                   the write-skew case). 5 would
\*                                   admit Begin → Read → Write →
\*                                   CommitSsi → second-Read → ... but
\*                                   that's strictly larger; 4 is the
\*                                   floor for the write-skew schedule).
\*   MaxTxAge  = 5                — TLA+ analogue of Rust MAX_TX_AGE
\*                                   (= 4096 in production). At the
\*                                   bounded OpNums={0,1,2} the
\*                                   truncation never fires (no slot
\*                                   can be old enough to evict); the
\*                                   constant exists so the
\*                                   PendingTxsWindowBounded invariant
\*                                   can refer to it. The bounded-
\*                                   window false-negative limitation 4
\*                                   in MVCCSsi.tla's head matter is the
\*                                   honest disclosure for production.
\*   SsiUnused = "Ssi"            — sentinel; no semantic role.
\*
\* CHECK_DEADLOCK FALSE — the bounded model has natural halt states
\* (all MaxOps + MaxTxOps consumed; no Active Tx left to commit or
\* abort). These are bound-induced, not contract bugs; TLC must not
\* flag them.
\*
\* INVARIANT BLOCK — 16 invariants total: 11 MVCCSi carried forward via
\* EXTENDS (TypeOKTx, SnapshotImmutability, ReadSetMonotonic,
\* ReadSetCoversAllReads, ReadAtSnapshot, TxStatusMonotonic, TypeOKSi,
\* WriteSetMonotonic, WriteWriteConflictDetected, CommitAtomicity,
\* FirstCommitterWins, DeterministicApply) + 5 SSI-specific per
\* Decision 7 (TypeOKSsi, PendingTxsWindowBounded,
\* DangerousStructureAborts, NoWriteSkew, SerializableEquivalence).
\*
\* References:
\*   docs/superpowers/specs/2026-05-24-mvcc-si-s2-4-design.md (S2.4 design)
\*   docs/superpowers/plans/2026-05-24-mvcc-si-s2-4.md        (S2.4 plan, T6)
\*   kesseldb-tla/MVCCSi.tla                                  (extended base)
\* ===========================================================================

SPECIFICATION SpecSsi

CONSTANTS
    TypeIds   = {1}
    ObjectIds = {1, 2}
    OpNums    = {0, 1, 2}
    Values    = {"v1", "v2"}
    MaxOps    = 3
    TxIds     = {"t1", "t2"}
    MaxTxOps  = 4
    MaxTxAge  = 5
    SiUnused  = "Si"
    SsiUnused = "Ssi"

INVARIANT
    TypeOKTx
    SnapshotImmutability
    ReadSetMonotonic
    ReadSetCoversAllReads
    ReadAtSnapshot
    TxStatusMonotonic
    TypeOKSi
    WriteSetMonotonic
    WriteWriteConflictDetected
    CommitAtomicity
    FirstCommitterWins
    DeterministicApply
    TypeOKSsi
    PendingTxsWindowBounded
    DangerousStructureAborts
    NoWriteSkew
    SerializableEquivalence

CHECK_DEADLOCK
    FALSE
