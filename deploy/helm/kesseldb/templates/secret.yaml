{{/*
We intentionally do NOT emit a Secret object here.

KESSELDB_TOKEN values should NEVER land in a Helm chart's rendered
YAML — they would be visible to anyone with `helm get manifest`
permissions and would persist in the release history's Secret
storage backing.

The recommended workflow (printed in NOTES.txt) is:

  kubectl create secret generic kesseldb-token \
    --from-literal=token=$(openssl rand -hex 32)
  helm install kesseldb ./deploy/helm/kesseldb

The Deployment template references that pre-existing Secret by
.Values.auth.secretName. If .Values.auth.secretName is empty (""),
the env-from-secret block is omitted entirely and the pod runs in
open (no-auth) mode — matching the Dockerfile's default behaviour.

This file exists so the templates directory documents the deliberate
absence of a Secret resource. The chart still works without it.
*/}}
