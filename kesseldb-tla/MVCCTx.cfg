\* ===========================================================================
\* kesseldb-tla/MVCCTx.cfg — TLC configuration for MVCCTx.tla
\* ===========================================================================
\*
\* SP111 / S2.2 — Task 6: baseline TLC model-check for the MVCC transaction
\* context + read-set tracking layer (extends MVCCStorage from SP110/S2.1).
\*
\* This file binds the spec's CONSTANTS (the MVCCStorage constants inherited
\* via EXTENDS plus the new TxIds + MaxTxOps) and lists the SIX state-
\* invariants TLC verifies in every reachable state of the bounded model.
\*
\* BOUNDED-MODEL CONSTANTS — chosen per the S2.2 design Decision 7 for a
\* small-but-meaningful state space that TLC can exhaust completely on a
\* Windows laptop in seconds-to-minutes:
\*
\*   TypeIds   = {1, 2}        — 2 distinct type_ids (inherited from
\*                                MVCCStorage; per-type isolation).
\*   ObjectIds = {1, 2}        — 2 distinct object_ids (inherited; per-key
\*                                isolation within the same type_id).
\*   OpNums    = 0..2          — 3 commit_opnums (TIGHTENED from MVCCStorage's
\*                                0..3 to compensate for the new Tx state
\*                                explosion; still exercises multi-version
\*                                chains AND a snapshot that falls between
\*                                versions).
\*   Values    = {"v1", "v2"}  — 2 distinct payloads (inherited).
\*   MaxOps    = 3             — bound on total Put + Tombstone actions
\*                                (TIGHTENED from MVCCStorage's 5 to keep
\*                                the composite Tx+storage state space
\*                                tractable; still exercises live/tombstone
\*                                chains).
\*   TxIds     = {"t1", "t2"}  — 2 concurrent Tx (Decision 7 of design).
\*   MaxTxOps  = 4             — bound on total Tx actions (TIGHTENED from
\*                                design's MaxTxOps=6 after initial sizing —
\*                                see TLC outcome below; still exercises
\*                                Begin→Read→Read→Commit or Begin→Read→Abort
\*                                multi-Tx interleavings).
\*
\* CHECK_DEADLOCK FALSE — the bounded model has natural halt states (all
\* MaxOps + MaxTxOps consumed; no Active Tx left to commit or abort).
\* These are bound-induced, not contract bugs; TLC must not flag them.
\*
\* References:
\*   docs/superpowers/specs/2026-05-24-mvcc-si-s2-2-design.md (S2.2 design)
\*   docs/superpowers/plans/2026-05-24-mvcc-si-s2-2.md        (S2.2 plan, T6)
\*   kesseldb-tla/MVCCStorage.tla                              (extended base)
\* ===========================================================================

SPECIFICATION SpecTx

CONSTANTS
    TypeIds   = {1, 2}
    ObjectIds = {1, 2}
    OpNums    = {0, 1, 2}
    Values    = {"v1", "v2"}
    MaxOps    = 3
    TxIds     = {"t1", "t2"}
    MaxTxOps  = 4

INVARIANT
    TypeOKTx
    SnapshotImmutability
    ReadSetMonotonic
    ReadSetCoversAllReads
    ReadAtSnapshot
    TxStatusMonotonic

CHECK_DEADLOCK
    FALSE
