\* ===========================================================================
\* kesseldb-tla/MVCCSi.cfg — TLC configuration for MVCCSi.tla
\* ===========================================================================
\*
\* SP112 / S2.3 — Task 6: baseline TLC model-check for the SI write-side +
\* deterministic SM-apply-time conflict-check layer (extends MVCCTx from
\* SP111/S2.2; extends MVCCStorage from SP110/S2.1).
\*
\* This file binds the spec's CONSTANTS (the MVCCStorage + MVCCTx constants
\* inherited via the EXTENDS chain plus the SI sentinel) and lists the
\* SIX SP111 invariants carried forward PLUS the FIVE new SI invariants
\* (TypeOKSi, WriteSetMonotonic, WriteWriteConflictDetected,
\* CommitAtomicity, FirstCommitterWins, DeterministicApply) per the S2.3
\* design Decision 7.
\*
\* BOUNDED-MODEL CONSTANTS — chosen per the S2.3 design Decision 7 for a
\* small-but-meaningful state space that TLC can exhaust completely on a
\* Windows laptop in seconds-to-minutes. The SI extension adds TxWrite +
\* CommitTx actions on top of the SP111 multi-Tx interleaving, so the
\* composite state space is super-linear in (Keys, OpNums, TxIds,
\* MaxTxOps). TIGHTENED from SP111 baseline (OpNums=0..2, MaxOps=3,
\* MaxTxOps=4) to keep the SI composite tractable.
\*
\*   TypeIds   = {1}           — 1 type_id (TIGHTENED from MVCCTx's {1,2}
\*                                to keep the SI composite tractable;
\*                                still exercises the per-(type_id,
\*                                object_id) key uniqueness via varying
\*                                ObjectIds within a single type).
\*   ObjectIds = {1, 2}        — 2 distinct object_ids (per-key isolation
\*                                within the same type_id; this is the
\*                                axis the SI conflict check works on).
\*   OpNums    = {0, 1, 2}     — 3 commit_opnums; exercises commit_opnum=0
\*                                edge (CommitTx skips conflict check) +
\*                                commit_opnum>0 conflict-window cases.
\*   Values    = {"v1", "v2"}  — 2 distinct payloads (matches MVCCTx);
\*                                exercises last-write-wins coalescing
\*                                in TxWrite (KAT-2 of S2.3 design) and
\*                                read-your-writes value-distinguish at
\*                                the abstract level.
\*   MaxOps    = 3             — bound on opCount (used as a state-space
\*                                cap on CommitTx-driven opCount growth;
\*                                free PutSi/TombstoneSi removed from
\*                                NextSi at TLC fix #3, so every opCount
\*                                bump is driven by a CommitTx; MaxOps
\*                                must be >= max(OpNums)+1 so the post-
\*                                commit opCount = c+1 stays within
\*                                TypeOK's 0..MaxOps range; with
\*                                OpNums=0..2, MaxOps=3 is the floor).
\*   TxIds     = {"t1", "t2"}  — 2 concurrent Tx (Decision 7 of design;
\*                                required for FirstCommitterWins testing).
\*   MaxTxOps  = 6             — bound on Tx + SI actions; matches the
\*                                S2.3 design Decision 7 sizing. Each
\*                                Tx can do Begin → Read+ → Write+ →
\*                                Commit (5-6 actions) across two Tx
\*                                with conflict windows. Composite SI
\*                                state space stays tractable
\*                                (~3.7M distinct states / depth 13 /
\*                                ~34s on Windows) — the bounded model
\*                                completes; larger bounds are an S2.X
\*                                follow-up.
\*   SiUnused  = "Si"          — sentinel constant; no semantic role.
\*
\* CHECK_DEADLOCK FALSE — the bounded model has natural halt states (all
\* MaxOps + MaxTxOps consumed; no Active Tx left to commit or abort).
\* These are bound-induced, not contract bugs; TLC must not flag them.
\*
\* INVARIANT BLOCK — 11 invariants total: 6 SP111 carried forward via
\* EXTENDS + 5 SI-specific per Decision 7.
\*
\* References:
\*   docs/superpowers/specs/2026-05-24-mvcc-si-s2-3-design.md (S2.3 design)
\*   docs/superpowers/plans/2026-05-24-mvcc-si-s2-3.md        (S2.3 plan, T6)
\*   kesseldb-tla/MVCCTx.tla                                  (extended base)
\*   kesseldb-tla/MVCCStorage.tla                             (root model)
\* ===========================================================================

SPECIFICATION SpecSi

CONSTANTS
    TypeIds   = {1}
    ObjectIds = {1, 2}
    OpNums    = {0, 1, 2}
    Values    = {"v1", "v2"}
    MaxOps    = 3
    TxIds     = {"t1", "t2"}
    MaxTxOps  = 6
    SiUnused  = "Si"

INVARIANT
    TypeOKTx
    SnapshotImmutability
    ReadSetMonotonic
    ReadSetCoversAllReads
    ReadAtSnapshot
    TxStatusMonotonic
    TypeOKSi
    WriteSetMonotonic
    WriteWriteConflictDetected
    CommitAtomicity
    FirstCommitterWins
    DeterministicApply

CHECK_DEADLOCK
    FALSE
